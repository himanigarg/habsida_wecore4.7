<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Iintoo Layout</title>
  <link rel="stylesheet" href="styles.css">

  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
  <div class="left_container">
    <img src="static/img/bg.jpg" alt="background-image">
    <div class="logo"><img src="static/img/logo.svg" alt="logo-image"></div>
  </div>

  <div class="right_container">

    <h2>Get iintoo it today</h2>
    <p class="subtext">There is no charge or obligation upon registration.</p>


    <div class="social_buttons">
      <button class="fb">
        <img src="static/img/facebook.svg" alt="fb_image" height="20px" width="20px"> Register with Facebook
      </button>
      <button class="in">
        <img src="static/img/linkedin.svg" alt="in_image" height="20px" width="20px"> Register with LinkedIn
      </button>
    </div>

    <div class="divider"><span>OR</span></div>


    <div class="form">
      <div class="field">
        <label>Email</label>
        <input type="email">
      </div>
    
      <div class="field">
        <label>Phone</label>
        <input type="text">
      </div>
    </div>

    <h3>What type of investor are you?</h3>
    <p class="subtext small">Select the type of investor you are below.</p>


    <div class="options">

      <label class="option">
        <input type="radio" name="type" checked>
        Individual
        <span class="info-icon">i
          <span class="tooltip">
            I am a natural person investing on my own behalf as a sole owner,
            joint tenant, or tenant in common.
          </span>
        </span>
      </label>
    
      <label class="option">
        <input type="radio" name="type">
        Business
        <span class="info-icon">i
          <span class="tooltip">
            I am a natural person investing on my own behalf as a sole owner,
            joint tenant, or tenant in common.
          </span>
        </span>
      </label>
    
      <label class="option">
        <input type="radio" name="type">
        IRA
        <span class="info-icon">i
          <span class="tooltip">
            I am a natural person investing on my own behalf as a sole owner,
            joint tenant, or tenant in common.
          </span>
        </span>
      </label>
    
      <label class="option">
        <input type="radio" name="type">
        Trust
        <span class="info-icon">i
          <span class="tooltip">
            I am a natural person investing on my own behalf as a sole owner,
            joint tenant, or tenant in common.
          </span>
        </span>
      </label>
    
    </div>

    <label class="checkbox">
      <input type="checkbox">
      I agree to the terms and receiving notifications from iintoo <a>View full terms</a>
    </label>

    <button class="submit_button">Create Account</button>
  </div>
</div>
</body>
</html>
